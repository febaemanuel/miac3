<!DOCTYPE html>
<html lang="pt-BR">
<head>
    {% include "partials/_head.html" %}
    <title>Documentos Publicados · MIAC</title>
    <script src="/miac/static/js/jquery-3.6.0.min.js"></script>
    <style>
        /* Sidebar desta página é mais larga para caber filtros */
        .sidebar {
            width: 290px;
            background: linear-gradient(160deg, var(--miac-sidebar-dark), var(--miac-sidebar));
            padding: 20px 18px;
        }
        .main-content { margin-left: 290px; }
        footer { margin-left: 290px; }

        /* Navegação por abrangência (dinâmica) */
        .abrangencia-navigation {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            margin-bottom: 18px;
        }
        .abrangencia-navigation .btn-abrang {
            width: 100%;
            font-size: .95rem;
            padding: 10px;
            border-radius: 8px;
            transition: transform .2s, box-shadow .2s, filter .2s;
            color: #fff;
            border: 2px solid transparent;
        }
        .abrangencia-navigation .btn-abrang:hover {
            transform: translateY(-2px);
            box-shadow: var(--miac-shadow-sm);
            filter: brightness(0.9);
            color: #fff;
        }
        .abrangencia-navigation .btn-abrang.active {
            filter: brightness(0.85);
            border-color: #fff;
        }

        /* Barra de pesquisa e filtros na sidebar */
        .sidebar .search-bar {
            background-color: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            width: 100%;
        }
        .sidebar .search-bar .input-group-text {
            background-color: rgba(255, 255, 255, .1);
            border-color: rgba(255, 255, 255, .15);
            color: #ecf0f1;
        }
        .sidebar .search-bar .form-control,
        .sidebar .search-bar select {
            background-color: #fff;
            color: var(--miac-text);
            font-size: .85rem;
            border-color: rgba(255, 255, 255, .15);
        }
        .sidebar ul li a#ver-favoritos {
            background-color: rgba(255, 193, 7, .18);
            color: #ffc107;
            font-weight: 600;
            border: 1px solid rgba(255, 193, 7, .35);
        }
        .sidebar ul li a#ver-favoritos:hover {
            background-color: rgba(255, 193, 7, .28);
            color: #fff;
        }
        .btn-highlight-novo {
            animation: pulseHighlight 1.5s infinite;
            box-shadow: 0 0 8px rgba(255, 193, 7, .6);
            position: relative;
        }
        @keyframes pulseHighlight {
            0%, 100% { box-shadow: 0 0 6px rgba(255, 193, 7, .4); }
            50%      { box-shadow: 0 0 18px rgba(255, 193, 7, .8); }
        }
        .tooltip-novidade {
            position: absolute;
            top: -32px; left: 50%; transform: translateX(-50%);
            background-color: #ffc107; color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: .7rem;
            font-weight: 600;
            white-space: nowrap;
        }

        /* Cabeçalho da página */
        h1.page-title--documentos {
            font-size: 1.9rem;
            color: var(--miac-text);
            margin-bottom: 24px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--miac-accent);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        /* Lista de favoritos */
        #favoritos-lista { max-width: 900px; margin: 0 auto; }
        #favoritos-lista h5 {
            font-size: 1.1rem; color: var(--miac-text);
            border-bottom: 2px solid var(--miac-border);
            padding-bottom: 6px; margin-bottom: 12px;
        }
        #favoritos-lista .list-group-item {
            background: var(--miac-light);
            border: 1px solid var(--miac-border);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        /* Accordion */
        .accordion-item {
            border: 1px solid var(--miac-border);
            margin-bottom: 10px;
            border-radius: 8px;
            overflow: hidden;
        }
        .accordion-button {
            font-size: 1rem;
            color: var(--miac-text);
            padding: 12px 20px;
        }
        .accordion-button:not(.collapsed) {
            background-color: var(--miac-light);
            color: var(--miac-text);
            box-shadow: none;
        }
        .accordion-button:focus { box-shadow: none; }

        /* Cards de organograma (usados pelo partial) */
        .organograma-card {
            transition: transform .25s, box-shadow .25s;
        }
        .organograma-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--miac-shadow);
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; }
            .main-content, footer { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>DOCUMENTOS INSTITUCIONAIS</h2>

        <div class="abrangencia-navigation">
            {% for a in abrangencias %}
            <button type="button"
                    class="btn btn-abrang{% if a.nome == abrangencia_selecionada %} active{% endif %}"
                    data-abrang="{{ a.nome }}"
                    data-cor="{{ a.cor }}"
                    style="background-color: {{ a.cor }}; border-color: {{ a.cor }};">
                {{ a.nome }}
            </button>
            {% endfor %}
        </div>

        <ul>
            <li>
                <div class="search-bar">
                    <form id="search-form" onsubmit="return false;">
                        <div class="input-group mb-2">
                            <span class="input-group-text"><i class="fas fa-search"></i></span>
                            <input type="text" id="nome" name="nome" placeholder="Buscar por nome" class="form-control">
                        </div>

                        <div class="input-group mb-2">
                            <span class="input-group-text"><i class="fas fa-filter"></i></span>
                            <select id="organograma" name="organograma" class="form-control">
                                <option value="">Organograma</option>
                                {% for org in organogramas %}
                                    <option value="{{ org.sigla }}">
                                        {% if org.nome_completo %}{{ org.nome_completo }} ({{ org.sigla }}){% else %}{{ org.sigla }}{% endif %}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="input-group mb-2">
                            <span class="input-group-text"><i class="fas fa-file-alt"></i></span>
                            <select id="tipo_documento" name="tipo_documento" class="form-control">
                                <option value="">Tipo de documento</option>
                                {% for tipo in tipos_documento %}
                                    <option value="{{ tipo }}">{{ tipo }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="input-group mb-2">
                            <span class="input-group-text"><i class="fas fa-sitemap"></i></span>
                            <input type="text" id="search-organograma" name="search-organograma" placeholder="Buscar por Cartão" class="form-control">
                        </div>

                        <div class="form-check form-switch text-white mb-2">
                            <input class="form-check-input" type="checkbox" id="apenas-complexo">
                            <label class="form-check-label" for="apenas-complexo">Apenas documentos do complexo</label>
                        </div>

                        <button type="button" id="limpar-filtros" class="btn btn-secondary w-100">
                            <i class="fas fa-times"></i> Limpar Filtros
                        </button>
                    </form>
                </div>
            </li>
            <li>
                <a href="#" id="ver-favoritos" class="btn-highlight-novo position-relative">
                    <i class="fas fa-star text-warning"></i> Meus Favoritos
                    <span class="tooltip-novidade">Novidade! Clique para ver</span>
                </a>
            </li>
            <li>
                <a href="#" id="abrir-tutorial"><i class="fas fa-play-circle"></i> Tutorial</a>
            </li>
        </ul>
    </div>

    <main class="main-content">
        <h1 class="page-title--documentos"><i class="fas fa-file-invoice"></i> DOCUMENTOS</h1>

        <div class="row" id="organograma-grid">
            {% include 'partials/document_list.html' %}
        </div>
    </main>

    {% include "partials/_footer.html" %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $('#abrir-tutorial').on('click', function () {
            window.open('https://www.youtube.com/watch?v=KeUJnHwpl4Q', '_blank');
        });

        $(document).ready(function () {
            let currentAbrangencia = {{ abrangencia_selecionada | tojson }};

            $('#apenas-complexo').on('change', atualizarResultados);

            function atualizarResultados() {
                const apenasComplexo = $('#apenas-complexo').is(':checked');
                const nome = $('#nome').val();
                const organograma = $('#organograma').val();
                const tipoDocumento = $('#tipo_documento').val();
                const searchOrganograma = $('#search-organograma').val();

                $('#organograma-grid').html('<div class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></div>');

                $.ajax({
                    url: "{{ url_for('buscar') }}",
                    type: "GET",
                    data: {
                        nome, organograma, tipo_documento: tipoDocumento,
                        abrangencia: currentAbrangencia,
                        apenas_complexo: apenasComplexo,
                        search_organograma: searchOrganograma
                    },
                    success: function (response) {
                        $('#organograma-grid').html(response);
                        initializePagination();
                        sessionStorage.setItem("marcadores", $('#organograma-grid').html());
                    },
                    error: function () {
                        $('#organograma-grid').html('<div class="alert alert-danger">Erro ao carregar resultados</div>');
                    }
                });
            }

            window.filterByAbrangencia = function (abrangencia) {
                currentAbrangencia = abrangencia;
                $('#organograma-grid').html('<p>Carregando...</p>');
                $.ajax({
                    url: "{{ url_for('buscar') }}",
                    method: 'GET',
                    data: { abrangencia: abrangencia },
                    success: function (response) {
                        $('#organograma-grid').html(response);
                        initializePagination();
                        sessionStorage.setItem("marcadores", $('#organograma-grid').html());
                    },
                    error: function () { alert('Erro ao buscar documentos. Tente novamente.'); }
                });

                const btnAtivo = $('.btn-abrang[data-abrang="' + abrangencia + '"]');
                const corAtiva = btnAtivo.data('cor') || 'var(--miac-accent)';
                $('.btn-abrang').removeClass('active');
                btnAtivo.addClass('active');

                $('h1.page-title--documentos')
                    .css({ color: corAtiva, 'border-bottom-color': corAtiva })
                    .html('<i class="fas fa-file-invoice"></i> DOCUMENTOS (' + abrangencia + ')');
            };

            $('.btn-abrang').on('click', function () {
                const abrang = $(this).data('abrang');
                filterByAbrangencia(abrang);
                sessionStorage.setItem("lastAbrangencia", abrang);
            });

            const salva = sessionStorage.getItem("lastAbrangencia");
            if (salva && $('.btn-abrang[data-abrang="' + salva + '"]').length) {
                currentAbrangencia = salva;
            }
            if (currentAbrangencia) {
                filterByAbrangencia(currentAbrangencia);
            }

            function searchDocuments(page = 1) {
                const nome = $('#nome').val();
                const organograma = $('#organograma').val();
                const tipo_documento = $('#tipo_documento').val();
                const apenas_complexo = $('#apenas-complexo').is(':checked');

                $.ajax({
                    url: "{{ url_for('buscar') }}",
                    method: 'GET',
                    data: { nome, organograma, tipo_documento, abrangencia: currentAbrangencia, page, apenas_complexo },
                    success: function (response) { $('#organograma-grid').html(response); },
                    error: function () { alert('Erro ao buscar documentos. Tente novamente.'); }
                });
            }

            $('#nome, #organograma, #tipo_documento').on('input', function () { searchDocuments(); });

            $('#limpar-filtros').on('click', function () {
                $('#nome').val('');
                $('#organograma').val('');
                $('#tipo_documento').val('');
                $('#apenas-complexo').prop('checked', false);

                const marcadoresSalvos = sessionStorage.getItem("marcadores");
                if (marcadoresSalvos) {
                    $('#organograma-grid').html(marcadoresSalvos);
                    initializePagination();
                } else {
                    filterByAbrangencia(currentAbrangencia);
                }
            });

            $(document).on('click', '.pagination a', function (e) {
                e.preventDefault();
                const page = $(this).attr('href').split('page=')[1];
                searchDocuments(page);
            });

            $('.accordion-button').on('click', function () {
                $('.accordion-collapse').not($(this).attr('data-bs-target')).collapse('hide');
            });

            $('#search-organograma').on('input', function () {
                const searchTerm = $(this).val().toLowerCase();
                let hasResults = false;

                $('.organograma-card').each(function () {
                    const cardText = $(this).find('h5').text().toLowerCase();
                    const nomeCompleto = $(this).data('nome-completo') || '';
                    if (cardText.includes(searchTerm) || nomeCompleto.includes(searchTerm)) {
                        $(this).closest('.organograma-card-container').show();
                        hasResults = true;
                    } else {
                        $(this).closest('.organograma-card-container').hide();
                    }
                });

                initializePagination();

                if (!hasResults) {
                    $('#organograma-grid').append('<p class="text-muted">Nenhum cartão encontrado.</p>');
                } else {
                    $('#organograma-grid').find('.text-muted').remove();
                }
            });

            function normalizarTexto(texto) {
                return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
            }

            function filterDocumentsInModal(modalId, searchTerm) {
                let hasResults = false;
                const searchNormalized = normalizarTexto(searchTerm);
                $(`#modal${modalId} .text-muted`).remove();

                $(`#modal${modalId} .accordion-item`).each(function () {
                    const tipoItem = $(this);
                    let tipoHasResults = false;

                    tipoItem.find('.document-list li').each(function () {
                        const docText = normalizarTexto($(this).find('h5').text());
                        if (docText.includes(searchNormalized)) {
                            $(this).show();
                            tipoHasResults = true;
                            hasResults = true;
                        } else {
                            $(this).hide();
                        }
                    });

                    if (tipoHasResults) {
                        tipoItem.show();
                        tipoItem.find('.accordion-collapse').collapse('show');
                    } else {
                        tipoItem.hide();
                        tipoItem.find('.accordion-collapse').collapse('hide');
                    }
                });

                if (!hasResults) {
                    $(`#modal${modalId} .accordion-body`).append('<p class="text-muted">Nenhum documento encontrado.</p>');
                }
            }

            $(document).on('input', '[id^="search-documentos"]', function () {
                const searchTerm = $(this).val();
                const modalId = $(this).attr('id').replace('search-documentos', '');
                filterDocumentsInModal(modalId, searchTerm);
            });

            // ========== FAVORITOS - LOCALSTORAGE ==========
            const STORAGE_KEY = 'favoritos';
            const VIEWED_KEY = 'favoritos_visto';

            function getFavoritos() {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            }
            function salvarFavoritos(favoritos) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(favoritos));
            }
            function mostrarToast(msg, tipo = 'success') {
                const alert = $(`
                    <div class="toast align-items-center text-white bg-${tipo} border-0" role="alert">
                        <div class="d-flex">
                            <div class="toast-body">${msg}</div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                        </div>
                    </div>`);
                $('.toast-container').append(alert);
                new bootstrap.Toast(alert[0]).show();
                setTimeout(() => alert.remove(), 4000);
            }
            function marcarFavoritosVisiveis() {
                const favoritos = getFavoritos();
                $('.btn-favorito').each(function () {
                    const id = $(this).data('id');
                    if (favoritos.find(doc => doc.id === id)) {
                        $(this).removeClass('btn-outline-warning').addClass('btn-warning');
                        $(this).html('<i class="fas fa-star"></i> Favorito');
                    }
                });
            }

            $(document).on('click', '.btn-favorito', function () {
                const btn = $(this);
                const id = btn.data('id');
                const nome = btn.data('nome');
                const tipo = btn.data('tipo');
                const caminho = btn.data('caminho');
                let favoritos = getFavoritos();

                const index = favoritos.findIndex(doc => doc.id === id);
                if (index >= 0) {
                    favoritos.splice(index, 1);
                    btn.removeClass('btn-warning').addClass('btn-outline-warning');
                    btn.html('<i class="fas fa-star"></i> Favorito');
                    mostrarToast('Removido dos favoritos', 'danger');
                } else {
                    favoritos.push({ id, nome, tipo, caminho, adicionado_em: new Date().toISOString() });
                    btn.removeClass('btn-outline-warning').addClass('btn-warning');
                    btn.html('<i class="fas fa-star"></i> Favorito');
                    mostrarToast('Adicionado aos favoritos');
                }
                salvarFavoritos(favoritos);
            });

            $(document).on('shown.bs.modal', marcarFavoritosVisiveis);

            $('#ver-favoritos').on('click', function () {
                const favoritos = getFavoritos();
                const agrupados = {};
                const container = $('#organograma-grid');

                if (!localStorage.getItem(VIEWED_KEY)) {
                    localStorage.setItem(VIEWED_KEY, 'true');
                    $('#ver-favoritos').removeClass('btn-highlight-novo');
                    $('#ver-favoritos .tooltip-novidade').remove();
                }

                container.html(`
                    <h2 style="color:#ffc107;font-weight:600;text-align:center;margin:20px 0 30px;font-size:2rem;">
                        <i class="fas fa-star"></i> Documentos Favoritos
                        <span class="badge bg-dark">${favoritos.length}</span>
                    </h2>
                    <div id="favoritos-lista"></div>`);

                if (favoritos.length === 0) {
                    $('#favoritos-lista').html(`
                        <div class="text-center p-4" style="max-width:600px;margin:0 auto;">
                            <div class="alert alert-info">
                                <h5 class="alert-heading"><i class="fas fa-info-circle"></i> Como adicionar favoritos</h5>
                                <p>Você ainda não tem documentos favoritos. Para adicionar:</p>
                                <ol class="text-start" style="display:inline-block;text-align:left;">
                                    <li>Acesse a lista de documentos</li>
                                    <li>Localize o botão <button class="btn btn-sm btn-outline-warning" disabled><i class="fas fa-star"></i> Favorito</button></li>
                                    <li>Clique para marcar como favorito</li>
                                </ol>
                                <hr>
                                <p class="mb-0">Seus favoritos aparecerão aqui para acesso rápido!</p>
                            </div>
                            <div class="text-center mt-4">
                                <button id="btn-voltar" class="btn btn-outline-secondary">
                                    <i class="fas fa-arrow-left"></i> Voltar
                                </button>
                            </div>
                        </div>`);
                    return;
                }

                favoritos.sort((a, b) => new Date(b.adicionado_em) - new Date(a.adicionado_em));
                favoritos.forEach(doc => {
                    if (!agrupados[doc.tipo]) agrupados[doc.tipo] = [];
                    agrupados[doc.tipo].push(doc);
                });

                let html = '';
                for (const tipo in agrupados) {
                    html += `<h5 class="mt-4">${tipo}</h5><ul class="list-group">`;
                    agrupados[tipo].forEach(doc => {
                        html += `
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                <div>
                                    <strong>${doc.nome}</strong><br>
                                    <a href="/miac/documento/${doc.id}">Detalhes</a> |
                                    <a href="/miac/${doc.caminho || ''}" target="_blank">Visualizar PDF</a>
                                </div>
                                <button class="btn btn-sm btn-outline-danger" data-remover-fav="${doc.id}">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </li>`;
                    });
                    html += '</ul>';
                }

                html += `
                    <div class="mt-4 d-flex justify-content-between flex-wrap gap-2">
                        <button id="btn-voltar" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Voltar</button>
                        <button id="limpar-favoritos" class="btn btn-outline-danger"><i class="fas fa-trash"></i> Limpar todos</button>
                    </div>`;

                $('#favoritos-lista').html(html);
            });

            $(document).on('click', '[data-remover-fav]', function () {
                const id = $(this).data('remover-fav');
                const favoritos = getFavoritos().filter(doc => doc.id !== id);
                salvarFavoritos(favoritos);
                $('#ver-favoritos').click();
                mostrarToast('Favorito removido', 'danger');
            });

            $(document).on('click', '#limpar-favoritos', function () {
                if (confirm('Tem certeza que deseja remover todos os favoritos?')) {
                    salvarFavoritos([]);
                    $('#ver-favoritos').click();
                }
            });

            $(document).on('click', '#btn-voltar', function () { location.reload(); });

            if (!$('.toast-container').length) {
                $('body').append('<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999;"></div>');
            }

            if (localStorage.getItem('favoritosHighlightVisto') === 'true') {
                $('#ver-favoritos').removeClass('btn-highlight-novo');
                $('.tooltip-novidade').remove();
            }
            $('#ver-favoritos').on('click', function () {
                $(this).removeClass('btn-highlight-novo');
                $(this).find('.tooltip-novidade').remove();
                localStorage.setItem('favoritosHighlightVisto', 'true');
            });

            window.initializePagination = function () {
                document.querySelectorAll('.organograma-pagination-container').forEach(container => {
                    const cards = Array.from(container.querySelectorAll('.organograma-card-container:not([style*="display: none"])'));
                    const totalCards = cards.length;
                    const cardsPerPage = 12;
                    let currentPage = 0;

                    function showPage(page) {
                        cards.forEach((card, index) => {
                            card.style.display = (index >= page * cardsPerPage && index < (page + 1) * cardsPerPage) ? 'block' : 'none';
                        });
                    }

                    function updateButtons() {
                        const prevButton = container.querySelector('.btn-pagination.prev');
                        const nextButton = container.querySelector('.btn-pagination.next');
                        const paginationButtons = container.querySelector('.pagination-buttons');

                        prevButton.disabled = currentPage === 0;
                        nextButton.disabled = currentPage >= Math.ceil(totalCards / cardsPerPage) - 1;
                        paginationButtons.style.display = (totalCards > cardsPerPage) ? 'flex' : 'none';
                    }

                    container.querySelector('.btn-pagination.prev').addEventListener('click', () => {
                        if (currentPage > 0) { currentPage--; showPage(currentPage); updateButtons(); }
                    });
                    container.querySelector('.btn-pagination.next').addEventListener('click', () => {
                        if (currentPage < Math.ceil(totalCards / cardsPerPage) - 1) { currentPage++; showPage(currentPage); updateButtons(); }
                    });

                    showPage(currentPage);
                    updateButtons();
                });
            };

            initializePagination();

            $(document).on('show.bs.modal', '.modal', function () {
                const modal = $(this);
                const organograma = modal.attr('id').replace('modal', '');

                modal.find('.modal-body').html(`
                    <div class="text-center my-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Carregando...</span>
                        </div>
                        <p>Carregando documentos...</p>
                    </div>`);

                $.get("/miac/carregar_documentos_modal", { organograma, abrangencia: currentAbrangencia }, function (response) {
                    modal.find('.modal-body').html(response);
                }).fail(function () {
                    modal.find('.modal-body').html('<div class="alert alert-danger">Erro ao carregar. Recarregue a página.</div>');
                });
            });

            window.gerarRelatorio = function (organograma) {
                if (!currentAbrangencia) return;
                window.location.href = `/miac/gerar_relatorio/${currentAbrangencia}/${organograma}`;
            };
        });
    </script>
</body>
</html>
