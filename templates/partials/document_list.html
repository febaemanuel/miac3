{% for documento in documentos %}
<li>
    <h5>{{ documento.titulo }}</h5>
    <p>Publicado em: {{ documento.data_publicacao }}</p>
    <div class="document-btns">
        <a href="{{ url_for('documento_detalhes', doc_id=documento.id) }}" class="btn btn-primary">
            <i class="fas fa-eye"></i> Acessar
        </a>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal{{ documento.id }}">
            <i class="fas fa-info-circle"></i> Ver Detalhes
        </button>
        <a href="{{ url_for('static', filename='uploads/' + documento.caminho.split('/')[-1]) }}" class="btn btn-secondary" target="_blank">
            <i class="fas fa-file-pdf"></i> Visualizar PDF
        </a>
    </div>
</li>
{% else %}
<p>Nenhum documento encontrado.</p>
{% endfor %}
