{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block extra_css %}
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    /* Hide sidebar and reset layout for login page */
    .sidebar,
    .sidebar-toggle,
    .sidebar-overlay {
        display: none !important;
    }

    .main-content {
        margin-left: 0 !important;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #2c3e50, #3498db);
        font-family: 'Roboto', sans-serif;
        animation: fadeIn 1.5s ease-in-out;
    }

    @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
    }

    .login-container {
        background-color: rgba(255, 255, 255, 0.9);
        padding: 30px 40px;
        border-radius: 15px;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
        0% { transform: translateY(100px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
    }

    .login-container h1 {
        font-size: 1.8rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 20px;
        color: #2c3e50;
    }

    .login-container label {
        font-weight: 600;
        color: #555;
    }

    .login-container .btn {
        border-radius: 50px;
        background-color: #3498db;
        color: white;
        padding: 12px 25px;
        font-size: 1rem;
        width: 100%;
        transition: all 0.3s ease;
    }

    .login-container .btn:hover {
        background-color: #2980b9;
        transform: translateY(-3px);
    }

    .login-container .form-control {
        background-color: #f9f9f9;
        border-radius: 8px;
        border: 1px solid #ddd;
        box-shadow: none;
        transition: all 0.3s ease;
    }

    .login-container .form-control:focus {
        border-color: #3498db;
        box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        transition: all 0.4s ease;
    }

    .login-container .form-control::placeholder {
        color: #aaa;
        font-style: italic;
    }

    .login-container .form-control:focus::placeholder {
        color: transparent;
    }

    .logo {
        display: block;
        margin: 0 auto 20px;
        max-width: 200px;
        animation: logoBounce 1s ease-in-out infinite alternate;
    }

    @keyframes logoBounce {
        0% { transform: translateY(-10px); }
        100% { transform: translateY(10px); }
    }

    .login-container .alert {
        font-size: 1rem;
        border-radius: 10px;
        padding: 15px;
        margin-top: 15px;
        text-align: center;
    }

    .forgot-password {
        text-align: center;
        margin-top: 10px;
    }

    .forgot-password a {
        color: #007bff;
        text-decoration: none;
        transition: color 0.3s ease;
    }

    .forgot-password a:hover {
        color: #0056b3;
        text-decoration: underline;
    }

    .loader {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container position-relative">
    <!-- Logo -->
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo">

    <h1>Login - UGQ</h1>
    <form action="{{ url_for('auth.login') }}" method="POST" id="loginForm">
        <div class="mb-3">
            <label for="username" class="form-label">Usuário</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Digite seu usuário" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Senha</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Digite sua senha" required>
        </div>
        <button type="submit" class="btn">Entrar</button>
    </form>

    {% if error %}
    <div class="alert alert-danger mt-3" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <div class="forgot-password">
        <a href="#">Esqueceu a senha?</a>
    </div>

    <div class="loader" id="loader"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById("loginForm").addEventListener("submit", function() {
        const btn = this.querySelector('button[type="submit"]');
        if (btn) MIAC.btnLoading(btn, true, 'Entrando...');
        const loader = document.getElementById("loader");
        if (loader) loader.style.display = "block";
    });
</script>
{% endblock %}
