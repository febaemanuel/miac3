<!DOCTYPE html>
<html lang="pt-BR">
<head>
    {% include "partials/_head.html" %}
    <title>Login · {{ org_config.sigla_app }}</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, var(--miac-sidebar) 0%, var(--miac-accent) 100%);
        }

        .login-card {
            background: var(--miac-surface);
            padding: 36px 32px;
            border-radius: 14px;
            box-shadow: var(--miac-shadow-lg);
            width: 100%;
            max-width: 400px;
        }

        .login-card .logo {
            display: block;
            margin: 0 auto 20px;
            max-width: 180px;
            max-height: 80px;
        }

        .login-card h1 {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 24px;
            color: var(--miac-text);
        }

        .login-card .btn-primary {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
        }

        .forgot-password {
            text-align: center;
            margin-top: 14px;
            font-size: .9rem;
        }

        .forgot-password a { text-decoration: none; }
        .forgot-password a:hover { text-decoration: underline; }

        .loader {
            display: none;
            margin: 16px auto 0;
            border: 3px solid var(--miac-light);
            border-top: 3px solid var(--miac-accent);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        {% if org_config.logo_path %}
            <img src="{{ url_for('static', filename=org_config.logo_path) }}" alt="{{ org_config.nome_empresa }}" class="logo">
        {% else %}
            <img src="/miac/static/images/logo.png" alt="Logo" class="logo">
        {% endif %}

        <h1>{{ org_config.sigla_app }}</h1>

        <form action="/miac/login" method="POST" id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Usuário</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Digite seu usuário" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>

        {% if error %}
            <div class="alert alert-danger mt-3" role="alert">{{ error }}</div>
        {% endif %}

        <div class="forgot-password">
            <a href="#">Esqueceu a senha?</a>
        </div>

        <div class="loader" id="loader"></div>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(event) {
            event.preventDefault();
            document.getElementById("loader").style.display = "block";
            document.querySelector(".btn-primary").disabled = true;
            setTimeout(() => document.getElementById("loginForm").submit(), 1200);
        });
    </script>
</body>
</html>
