<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Marcadores de Organograma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Gerenciar Marcadores de Organograma</h1>

        <form method="POST">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Organograma</th>
                        <th>Abrangência</th>
                        <th>Marcador</th>
                    </tr>
                </thead>
                <tbody>
                    {% for organograma, abrangencia, marcador in organogramas %}
                        <tr>
                            <td>{{ organograma }}</td>
                            <td>{{ abrangencia }}</td>
                            <td>
                                <input 
                                    type="text" 
                                    name="marcador_{{ organograma }}_{{ abrangencia }}" 
                                    value="{{ marcador or '' }}" 
                                    class="form-control"
                                >
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>

            <!-- Adicionar Novo Marcador -->
            <h3 class="mt-4">Adicionar Novo Marcador</h3>
            <div class="row">
                <div class="col-md-4">
                    <input 
                        type="text" 
                        name="novo_organograma" 
                        placeholder="Nome do Organograma" 
                        class="form-control"
                    >
                </div>
                <div class="col-md-4">
                    <select name="novo_abrangencia" class="form-control">
                        <option value="">Selecione a Abrangência</option>
                        <option value="HUWC">HUWC</option>
                        <option value="MEAC">MEAC</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <input 
                        type="text" 
                        name="novo_marcador" 
                        placeholder="Novo Marcador" 
                        class="form-control"
                    >
                </div>
            </div>

            <button type="submit" class="btn btn-primary mt-3">Salvar Alterações</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
