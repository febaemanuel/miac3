<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Documento - MIAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/base.css') }}" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #f0f4f8, #dfe6e9);
            color: #333;
            display: flex;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Estilos da sidebar */
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            height: 100vh;
            padding: 20px;
            position: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease-in-out;
        }

        .sidebar h2 {
            font-size: 1.75rem;
            margin-bottom: 40px;
            color: #ecf0f1;
            font-weight: bold;
            animation: fadeIn 1s ease-in-out;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            width: 100%;
        }

        .sidebar ul li {
            margin: 15px 0;
            padding: 12px 18px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.3s, transform 0.2s;
            animation: slideIn 0.5s ease-in-out;
        }

        .sidebar ul li:hover {
            background-color: #34495e;
            transform: translateX(5px);
        }

        .sidebar ul li a {
            text-decoration: none;
            color: white;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
        }

        .sidebar ul li a i {
            margin-right: 12px;
        }

        /* Estilos da área de conteúdo */
        .main-content {
            margin-left: 250px;
            padding: 40px;
            flex-grow: 1;
            background: #ecf0f1;
            color: #333;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: margin-left 0.3s ease-in-out;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            animation: fadeInUp 0.5s ease-in-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #3498db;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #7f8c8d;
            line-height: 1.6;
            text-align: center;
            animation: fadeIn 1.5s ease-in-out;
        }

        .btn {
            border-radius: 30px;
            background-color: #3498db;
            color: white;
            padding: 12px 25px;
            font-size: 1.1rem;
            transition: background-color 0.3s, transform 0.2s;
            margin: 10px;
            width: 100%;
            animation: fadeInUp 0.5s ease-in-out;
        }

        .btn:hover {
            background-color: #2980b9;
            transform: translateY(-3px);
        }

        /* Estilo do formulário */
        .form-group {
            margin-bottom: 20px;
            animation: fadeInUp 0.5s ease-in-out;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 1rem;
            border: 1px solid #ccc;
            width: 100%;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-control:focus {
            border-color: #3498db;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
        }

        label {
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
            color: #2c3e50;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 20px 10px;
                transform: translateX(-100%);
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .sidebar.active {
                transform: translateX(0);
            }
        }

        /* Animações */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>MIAC</h2>
        <ul>
            <li><a href="#"><i class="fas fa-home"></i> Página Inicial</a></li>
            <li><a href="#"><i class="fas fa-file-alt"></i> Arquivos</a></li>
            <li><a href="#"><i class="fas fa-cogs"></i> Configurações</a></li>
            <li><a href="#"><i class="fas fa-question-circle"></i> Ajuda</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="container">
            <h1>Cadastro de Documento</h1>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="gerencia_organograma">Gerência (Organograma)</label>
                    <input type="text" class="form-control" id="gerencia_organograma" name="gerencia_organograma" required>
                </div>
                <div class="form-group">
                    <label for="unidade_organograma">Unidade (Organograma)</label>
                    <input type="text" class="form-control" id="unidade_organograma" name="unidade_organograma" required>
                </div>
                <div class="form-group">
                    <label for="abrangencia">Abrangência</label>
                    <input type="text" class="form-control" id="abrangencia" name="abrangencia" required>
                </div>
                <div class="form-group">
                    <label for="tipo">Tipo</label>
                    <input type="text" class="form-control" id="tipo" name="tipo" required>
                </div>
                <div class="form-group">
                    <label for="codigo">Código</label>
                    <input type="text" class="form-control" id="codigo" name="codigo" required>
                </div>
                <div class="form-group">
                    <label for="numero">Número</label>
                    <input type="text" class="form-control" id="numero" name="numero" required>
                </div>
                <div class="form-group">
                    <label for="situacao">Situação de Publicação</label>
                    <input type="text" class="form-control" id="situacao" name="situacao" required>
                </div>
                <div class="form-group">
                    <label for="data_emissao">Data de Emissão</label>
                    <input type="date" class="form-control" id="data_emissao" name="data_emissao" required>
                </div>
                <div class="form-group">
                    <label for="data_revisao">Data de Revisão</label>
                    <input type="date" class="form-control" id="data_revisao" name="data_revisao" required>
                </div>
                <div class="form-group">
                    <label for="responsavel">Pessoa Responsável</label>
                    <input type="text" class="form-control" id="responsavel" name="responsavel" required>
                </div>
                <button type="submit" class="btn">Cadastrar Documento</button>
            </form>
        </div>
    </div>

    <script>
        // Script para mostrar/esconder a sidebar em dispositivos móveis
        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.querySelector('.sidebar');
            const mainContent = document.querySelector('.main-content');

            if (window.innerWidth <= 768) {
                sidebar.classList.add('active');
                mainContent.style.marginLeft = '0';
            }

            window.addEventListener('resize', function() {
                if (window.innerWidth <= 768) {
                    sidebar.classList.add('active');
                    mainContent.style.marginLeft = '0';
                } else {
                    sidebar.classList.remove('active');
                    mainContent.style.marginLeft = '250px';
                }
            });
        });
    </script>

</body>
</html>
