{% extends "base.html" %}

{% block title %}Cadastro de Documento{% endblock %}

{% block extra_css %}
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    .main-content {
        font-family: 'Roboto', sans-serif;
    }

    .container {
        background-color: #ffffff;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 800px;
        animation: fadeInUp 0.5s ease-in-out;
        margin: 0 auto;
    }

    h1 {
        font-size: 2.5rem;
        font-weight: 600;
        margin-bottom: 20px;
        color: #3498db;
        text-align: center;
        animation: fadeIn 1s ease-in-out;
    }

    p {
        font-size: 1.1rem;
        margin-bottom: 30px;
        color: #7f8c8d;
        line-height: 1.6;
        text-align: center;
        animation: fadeIn 1.5s ease-in-out;
    }

    .btn {
        border-radius: 30px;
        background-color: #3498db;
        color: white;
        padding: 12px 25px;
        font-size: 1.1rem;
        transition: background-color 0.3s, transform 0.2s;
        margin: 10px;
        width: 100%;
        animation: fadeInUp 0.5s ease-in-out;
    }

    .btn:hover {
        background-color: #2980b9;
        transform: translateY(-3px);
    }

    .form-group {
        margin-bottom: 20px;
        animation: fadeInUp 0.5s ease-in-out;
    }

    .form-control {
        border-radius: 10px;
        padding: 12px 15px;
        font-size: 1rem;
        border: 1px solid #ccc;
        width: 100%;
        transition: border-color 0.3s, box-shadow 0.3s;
    }

    .form-control:focus {
        border-color: #3498db;
        box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
    }

    label {
        font-weight: 500;
        margin-bottom: 8px;
        display: block;
        color: #2c3e50;
    }

    @media (max-width: 768px) {
        .container {
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
        }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <h1>Cadastro de Documento</h1>
    <form action="#" method="post">
        <div class="form-group">
            <label for="gerencia_organograma">Gerência (Organograma)</label>
            <input type="text" class="form-control" id="gerencia_organograma" name="gerencia_organograma" required>
        </div>
        <div class="form-group">
            <label for="unidade_organograma">Unidade (Organograma)</label>
            <input type="text" class="form-control" id="unidade_organograma" name="unidade_organograma" required>
        </div>
        <div class="form-group">
            <label for="abrangencia">Abrangência</label>
            <input type="text" class="form-control" id="abrangencia" name="abrangencia" required>
        </div>
        <div class="form-group">
            <label for="tipo">Tipo</label>
            <input type="text" class="form-control" id="tipo" name="tipo" required>
        </div>
        <div class="form-group">
            <label for="codigo">Código</label>
            <input type="text" class="form-control" id="codigo" name="codigo" required>
        </div>
        <div class="form-group">
            <label for="numero">Número</label>
            <input type="text" class="form-control" id="numero" name="numero" required>
        </div>
        <div class="form-group">
            <label for="situacao">Situação de Publicação</label>
            <input type="text" class="form-control" id="situacao" name="situacao" required>
        </div>
        <div class="form-group">
            <label for="data_emissao">Data de Emissão</label>
            <input type="date" class="form-control" id="data_emissao" name="data_emissao" required>
        </div>
        <div class="form-group">
            <label for="data_revisao">Data de Revisão</label>
            <input type="date" class="form-control" id="data_revisao" name="data_revisao" required>
        </div>
        <div class="form-group">
            <label for="responsavel">Pessoa Responsável</label>
            <input type="text" class="form-control" id="responsavel" name="responsavel" required>
        </div>
        <button type="submit" class="btn">Cadastrar Documento</button>
    </form>
</div>
{% endblock %}
