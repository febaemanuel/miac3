<!DOCTYPE html>
<html lang="pt-BR">
<head>
    {% include "partials/_head.html" %}
    <title>Cadastro de Documento · MIAC</title>
</head>
<body>
    {% include "partials/_sidebar.html" %}

    <main class="main-content">
        <div class="page-container page-container--narrow">
            <h1 class="page-title"><i class="fas fa-file-medical"></i> Cadastro de Documento</h1>

            <form action="#" method="post">
                <div class="mb-3">
                    <label for="gerencia_organograma" class="form-label">Gerência (Organograma)</label>
                    <input type="text" class="form-control" id="gerencia_organograma" name="gerencia_organograma" required>
                </div>
                <div class="mb-3">
                    <label for="unidade_organograma" class="form-label">Unidade (Organograma)</label>
                    <input type="text" class="form-control" id="unidade_organograma" name="unidade_organograma" required>
                </div>
                <div class="mb-3">
                    <label for="abrangencia" class="form-label">Abrangência</label>
                    <input type="text" class="form-control" id="abrangencia" name="abrangencia" required>
                </div>
                <div class="mb-3">
                    <label for="tipo" class="form-label">Tipo</label>
                    <input type="text" class="form-control" id="tipo" name="tipo" required>
                </div>
                <div class="mb-3">
                    <label for="codigo" class="form-label">Código</label>
                    <input type="text" class="form-control" id="codigo" name="codigo" required>
                </div>
                <div class="mb-3">
                    <label for="numero" class="form-label">Número</label>
                    <input type="text" class="form-control" id="numero" name="numero" required>
                </div>
                <div class="mb-3">
                    <label for="situacao" class="form-label">Situação de Publicação</label>
                    <input type="text" class="form-control" id="situacao" name="situacao" required>
                </div>
                <div class="mb-3">
                    <label for="data_emissao" class="form-label">Data de Emissão</label>
                    <input type="date" class="form-control" id="data_emissao" name="data_emissao" required>
                </div>
                <div class="mb-3">
                    <label for="data_revisao" class="form-label">Data de Revisão</label>
                    <input type="date" class="form-control" id="data_revisao" name="data_revisao" required>
                </div>
                <div class="mb-3">
                    <label for="responsavel" class="form-label">Pessoa Responsável</label>
                    <input type="text" class="form-control" id="responsavel" name="responsavel" required>
                </div>

                <div class="btn-container">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Cadastrar Documento
                    </button>
                </div>
            </form>
        </div>
    </main>

    {% include "partials/_footer.html" %}
</body>
</html>
