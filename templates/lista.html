<!DOCTYPE html>
<html lang="pt-BR">
<head>
    {% include "partials/_head.html" %}
    <title>Cadastro de Documento · MIAC</title>
    <style>
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            background: linear-gradient(135deg, #f0f4f8, #dfe6e9);
        }

        .form-container {
            background-color: var(--miac-surface);
            padding: 36px;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 820px;
            animation: fadeInUp 0.5s ease-in-out;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--miac-accent);
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.95rem;
            border: 1px solid var(--miac-border);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-control:focus {
            border-color: var(--miac-accent);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        label {
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
            color: var(--miac-primary-dark);
        }

        .btn-submit {
            border-radius: 30px;
            background-color: var(--miac-accent);
            color: white;
            padding: 11px 28px;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s, transform 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--miac-primary-hover);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .main-content { padding: 20px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    {% include "partials/_sidebar.html" %}

    <div class="main-content">
        <div class="form-container">
            <h1>Cadastro de Documento</h1>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="gerencia_organograma">Gerência (Organograma)</label>
                    <input type="text" class="form-control" id="gerencia_organograma" name="gerencia_organograma" required>
                </div>
                <div class="form-group">
                    <label for="unidade_organograma">Unidade (Organograma)</label>
                    <input type="text" class="form-control" id="unidade_organograma" name="unidade_organograma" required>
                </div>
                <div class="form-group">
                    <label for="abrangencia">Abrangência</label>
                    <input type="text" class="form-control" id="abrangencia" name="abrangencia" required>
                </div>
                <div class="form-group">
                    <label for="tipo">Tipo</label>
                    <input type="text" class="form-control" id="tipo" name="tipo" required>
                </div>
                <div class="form-group">
                    <label for="codigo">Código</label>
                    <input type="text" class="form-control" id="codigo" name="codigo" required>
                </div>
                <div class="form-group">
                    <label for="numero">Número</label>
                    <input type="text" class="form-control" id="numero" name="numero" required>
                </div>
                <div class="form-group">
                    <label for="situacao">Situação de Publicação</label>
                    <input type="text" class="form-control" id="situacao" name="situacao" required>
                </div>
                <div class="form-group">
                    <label for="data_emissao">Data de Emissão</label>
                    <input type="date" class="form-control" id="data_emissao" name="data_emissao" required>
                </div>
                <div class="form-group">
                    <label for="data_revisao">Data de Revisão</label>
                    <input type="date" class="form-control" id="data_revisao" name="data_revisao" required>
                </div>
                <div class="form-group">
                    <label for="responsavel">Pessoa Responsável</label>
                    <input type="text" class="form-control" id="responsavel" name="responsavel" required>
                </div>
                <button type="submit" class="btn-submit">Cadastrar Documento</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
