<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
	<style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
            background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
            color: #333;
        }

        .sidebar {
            width: 250px;
            background-color: #34495e;
            color: white;
            height: 100vh;
            padding: 20px 10px;
            position: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 3px 0 10px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.5s ease-in-out;
        }

        .sidebar h2 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            color: #ecf0f1;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            width: 100%;
        }

        .sidebar ul li {
            margin: 10px 0;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 10px;
            transition: background 0.3s, transform 0.2s;
        }

        .sidebar ul li:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .sidebar ul li a {
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            font-size: 1rem;
        }

        .sidebar ul li a i {
            margin-right: 10px;
        }

        .main-content {
            margin-left: 250px;
            padding: 40px;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            animation: fadeIn 0.5s ease-in-out;
        }

        h1 {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            color: #007bff;
        }

        label {
            font-weight: bold;
        }

        .btn {
            border-radius: 30px;
            background-color: #007bff;
            color: white;
            transition: all 0.3s ease-in-out;
            padding: 10px 20px;
            font-size: 1rem;
        }

        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-3px);
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }

        #loading {
            display: none;
            margin-top: 20px;
            text-align: center;
        }

        #success-message {
            display: none;
            background-color: #28a745;
            color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: bold;
        }

        #success-message i {
            font-size: 2rem;
            margin-right: 15px;
        }

        #success-message a {
            color: #ffffff;
            text-decoration: underline;
        }

        #success-message button {
            margin-top: 20px;
        }

        .form-section {
            margin-bottom: 20px;
        }

        .form-section h3 {
            font-size: 1.25rem;
            margin-bottom: 15px;
            color: #555;
            border-bottom: 2px solid #007bff;
            padding-bottom: 5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        #publicar-loading {
            display: none;
            margin-left: 10px;
        }

        .form-section text-center {
            text-align: center;
        }

        .progress {
            height: 10px;
            margin-top: 20px;
        }

        .progress-bar {
            background-color: #007bff;
        }

        .toggle-buttons {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .toggle-buttons button {
            margin: 0 10px;
        }

        .toggle-buttons button.active {
            background-color: #0056b3;
        }
		/* Estilização dos botões */
.btn-lg {
    font-size: 1.1rem;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: bold;
    transition: all 0.3s ease-in-out;
}

.btn-lg:hover {
    transform: translateY(-2px);
}

/* Ícones espaçados nos botões */
.btn i {
    margin-right: 8px;
}

/* Estilização dos botões para ficarem alinhados */
.d-flex.gap-3 {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

    </style>
    <link href="{{ url_for('static', filename='css/base.css') }}" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <h2>MIAC</h2>
        <ul>
            <li><a href="#"><i class="fas fa-home"></i> Página Inicial</a></li>
            <li><a href="#"><i class="fas fa-file-alt"></i> Arquivos</a></li>
            <li><a href="#"><i class="fas fa-cogs"></i> Configurações</a></li>
            <li><a href="#"><i class="fas fa-question-circle"></i> Ajuda</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="container">
            <h1>PUBLICAR 2</h1>

            <!-- Botões de alternância entre Manual e IA -->
            <div class="toggle-buttons">
                <button id="manual-btn" class="btn active">Preenchimento Manual</button>
                <button id="ia-btn" class="btn">Extrair Dados via IA</button>
            </div>

       <!-- Formulário Manual (substitua o existente por este) -->
<form id="form-manual" onsubmit="publicarManual(event)">
    <div class="form-section">
        <h3>Envio de Arquivo</h3>
        <div class="form-group">
    <label for="pdf_file_manual">Arquivo PDF ou DOC</label>
    <input type="file" class="form-control" id="pdf_file_manual" name="pdf_file" multiple 
           accept=".pdf,.doc,.docx" required>
    <small class="text-muted">Selecione um ou mais arquivos (PDF ou Word)</small>
</div>
    </div>

    <div class="form-section">
        <h3>Dados do Documento</h3>
        
        <!-- Título -->
        <div class="form-group">
            <label for="titulo_manual">Título*</label>
            <input type="text" class="form-control" id="titulo_manual" name="titulo[]" required>
        </div>

        <!-- Organograma -->
        <div class="form-group">
            <label for="organograma_manual">Organograma*</label>
            <select class="form-control" id="organograma_manual" name="organograma[]" required>
                <option value="">Selecione...</option>
                {% for org in organogramas %}
                    <option value="{{ org }}">{{ org }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Tipo Documento -->
        <div class="form-group">
            <label for="tipo_documento_manual">Tipo de Documento*</label>
            <select class="form-control" id="tipo_documento_manual" name="tipo_documento[]" required>
                <option value="">Selecione...</option>
                {% for tipo in tipos_documento %}
                    <option value="{{ tipo }}">{{ tipo }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Abrangência -->
        <div class="form-group">
            <label for="abrangencia_manual">Abrangência*</label>
            <select class="form-control" id="abrangencia_manual" name="abrangencia[]" required>
                <option value="">Selecione...</option>
                {% for abrang in abrangencias %}
                    <option value="{{ abrang }}">{{ abrang }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Data Elaboração -->
        <div class="form-group">
            <label for="data_elaboracao_manual">Data de Elaboração*</label>
            <input type="date" class="form-control" id="data_elaboracao_manual" name="data_elaboracao[]" required>
        </div>

        <!-- Vencimento -->
        <div class="form-group">
            <label for="vencimento_manual">Vencimento*</label>
            <input type="date" class="form-control" id="vencimento_manual" name="vencimento[]" required>
        </div>

        <!-- Número SEI -->
        <div class="form-group">
            <label for="numero_sei_manual">Número SEI</label>
            <input type="text" class="form-control" id="numero_sei_manual" name="numero_sei[]" placeholder="Opcional">
        </div>

        <!-- Elaboradores -->
        <div class="form-group">
            <label for="elaboradores_manual">Elaboradores</label>
            <input type="text" class="form-control" id="elaboradores_manual" name="elaboradores[]" placeholder="Separe por vírgula">
        </div>
    </div>

    <div class="form-section text-center mt-4">
        <button type="submit" class="btn btn-primary btn-lg">
            <i class="fas fa-save"></i> Publicar Documento(s)
            <div class="spinner-border spinner-border-sm ms-2" id="publicar-loading" style="display: none;"></div>
        </button>
    </div>
</form>

            <!-- Formulário de Extração via IA -->
            <form id="form-ia" enctype="multipart/form-data" style="display: none;">
                <div class="form-section">
                    <h3>Envio de Arquivo</h3>
                    <div class="form-group">
                        <label for="pdf_file_ia">Arquivos PDF</label>
                        <input type="file" class="form-control" id="pdf_file_ia" name="pdf_file" multiple required>
                    </div>
					<div class="form-group">
    <label for="modelo-ia">Escolha o Modelo de IA</label>
    <select class="form-control" id="modelo-ia" name="modelo_ia">
        <option value="deepseek">DeepSeek</option>
        <option value="chatgpt">ChatGPT</option>
    </select>
</div>
                    <div class="d-flex align-items-center">
                        <button type="submit" class="btn" id="obter-dados-btn">Obter Dados</button>
                        <div class="spinner" id="obter-loading"></div>
                    </div>
                </div>
                
                <!-- Selecao manual da Abrangência -->
               

             
            </form>

            <!-- Campos para exibir dados extraídos -->
            <div id="dados-extraidos" style="display:none;">
               <div class="form-group">
    <label for="titulo">Título</label>
    <input type="text" class="form-control" id="titulo_ia" name="titulo[]">
</div>

                <div class="form-group">
                    <label for="data_elaboracao">Data de Elaboração</label>
                    <input type="text" class="form-control" id="data_elaboracao">
                </div>
                <div class="form-group">
                    <label for="vencimento">Vencimento</label>
                    <input type="text" class="form-control" id="vencimento">
                </div>
                <div class="form-group">
                    <label for="numero_sei">Número SEI</label>
                    <input type="text" class="form-control" id="numero_sei">
                </div>
                <div class="form-group">
                    <label for="organograma_ia">Organograma</label>
                    <input type="text" class="form-control" id="organograma_ia">
                </div>
				<div class="form-group">
    <label for="elaboradores_ia">Elaboradores</label>
    <input type="text" class="form-control" id="elaboradores_ia">
</div>
				<div class="form-group">
    <label for="abrangencia_ia">Abrangência</label>
    <input type="text" class="form-control" id="abrangencia_ia">
</div>
		
                <div class="form-group">
                    <label for="tipo_documento_ia">Tipo de Documento</label>
                    <input type="text" class="form-control" id="tipo_documento_ia">
                </div>
            </div>

            <!-- Navegação entre arquivos -->
            <div id="nav-arquivos" style="display: none; text-align: center; margin-bottom: 10px;">
                <button id="prev-arquivo" class="btn btn-secondary">&#9664;</button>
                <span id="arquivo-atual">1</span> / <span id="total-arquivos">1</span>
                <button id="next-arquivo" class="btn btn-secondary">&#9654;</button>
            </div>

            <!-- Botão para publicar todos os arquivos extraídos -->
            <div class="form-section text-center mt-4">
			<div id="progresso" style="margin-top: 10px; font-weight: bold;"></div>
                <button type="button" class="btn btn-success" id="publicar-todos-btn" style="display: none;">
                    Publicar Todos
                    <div class="spinner" id="publicar-todos-loading"></div>
                </button>
            </div>
			<!-- Botões de ação para arquivos com erro -->
<div id="arquivos-com-erro" style="display: none; margin-top: 20px;">
    <h3>Arquivos com Erro:</h3>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Arquivo</th>
                <th>Campos com Erro</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="tabela-arquivos-erro">
            <!-- Linhas preenchidas dinamicamente -->
        </tbody>
    </table>

    <!-- Container para botões com alinhamento -->
    <div class="d-flex justify-content-center gap-3 mt-3">
        <button type="button" class="btn btn-warning btn-lg" id="processar-novamente-btn" style="display: none;">
            <i class="fas fa-sync-alt"></i> Reprocessar Selecionados
            <div class="spinner-border spinner-border-sm ms-2" id="processar-novamente-loading" style="display: none;"></div>
        </button>

        <button type="button" class="btn btn-info btn-lg" id="continuar-editar-btn" style="display: none;">
            <i class="fas fa-edit"></i> Continuar e Editar Manualmente
        </button>
    </div>
</div>


   <script src="/miac/static/js/jquery-3.6.0.min.js"></script>
<script>
    window.MIAC_URLS = {
        obter_dados: "{{ url_for('obter_dados') }}",
        publicar2: "{{ url_for('publicar2') }}"
    };
</script>
<script src="{{ url_for('static', filename='js/publicar2.js') }}"></script>
</body>
</html>
